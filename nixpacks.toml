[providers]
providers = ["php"]

[phases.setup]
nixPkgs = ["php83", "php83Packages.composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:clear",
    "php artisan route:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
