version: '3.8'

services:
  # Laravel Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: supply-chain-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - supply-chain-network

  # Nginx Web Server Service
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - supply-chain-network

  # MySQL Database Service
  db:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-supply_chain_risk}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - supply-chain-network

networks:
  supply-chain-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
